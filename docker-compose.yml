version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: legal-rights-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: securepassword123
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - legal-rights-network

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: legal-rights-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: mongodb://admin:securepassword123@mongodb:27017/legalrights?authSource=admin
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    networks:
      - legal-rights-network

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: legal-rights-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - legal-rights-network
    environment:
      REACT_APP_API_URL: http://localhost:5000

  selenium-hub:
    image: selenium/hub:4.15.0
    container_name: selenium-hub
    ports:
      - "4444:4444"
    networks:
      - legal-rights-network

  chrome:
    image: selenium/node-chrome:4.15.0
    container_name: selenium-chrome
    depends_on:
      - selenium-hub
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
    networks:
      - legal-rights-network

  # ✅ Prometheus added correctly inside services
  prometheus:
    image: prom/prometheus
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - legal-rights-network

  # ✅ Grafana added correctly inside services
  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    networks:
      - legal-rights-network

networks:
  legal-rights-network:
    driver: bridge

volumes:
  mongodb_data:
